name: Build2512

on:
  workflow_dispatch:
   
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6  # 修复：使用 v4 而不是 v6

    - name: Free up space
      uses: BRAINSia/free-disk-space@v2
      with:
        tool-cache: false
        mandb: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 初始化编译环境
      run: |
        curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh | sudo bash > /dev/null
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
   
    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        echo "FILE_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Update & Install feeds
      run: |
        chmod +x armsr/armv8/diy/diy.sh
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        $GITHUB_WORKSPACE/armsr/armv8/diy/diy.sh

    - name: Load N1 custom config
      run: |
        rm -rf openwrt/files openwrt/.config
        mv armsr/armv8/N1/files armsr/armv8/N1/.config openwrt/

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j$(( $(nproc) * 2 ))
        find dl -size -1k -exec rm -f {} \;

    - name: Compile N1 firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(( $(nproc) + 1 )) || make -j1 V=s

    - name: Check and fix build artifacts
      run: |
        cd openwrt
        echo "=== 查找编译产物 ==="
        find bin/targets -name "*.tar.gz" -type f
        find bin/targets -name "*.img" -type f
    
        echo "=== 检查 armsr/armv8 目录 ==="
        ls -la bin/targets/armsr/armv8/ || echo "目录不存在"
    
         # 直接使用存在的 rootfs 文件创建软链接
        if ls bin/targets/armsr/armv8/*-rootfs.tar.gz 1> /dev/null 2>&1; then
        ROOTFS_FILE=$(ls bin/targets/armsr/armv8/*-rootfs.tar.gz | head -1)
        echo "找到 rootfs: $ROOTFS_FILE"
        ln -sf "$(basename "$ROOTFS_FILE")" bin/targets/armsr/armv8/openwrt-armsr-armv8-generic-rootfs.tar.gz
        elif ls bin/targets/armsr/armv8/*.tar.gz 1> /dev/null 2>&1; then
        TAR_FILE=$(ls bin/targets/armsr/armv8/*.tar.gz | head -1)
        echo "找到 tar.gz: $TAR_FILE"
        ln -sf "$(basename "$TAR_FILE")" bin/targets/armsr/armv8/openwrt-armsr-armv8-generic-rootfs.tar.gz
        else
        echo "错误：未找到任何 rootfs 文件！"
        exit 1
        fi

    - name: Package N1 firmware
      uses: unifreq/openwrt_packit@master
      env:  # 修复：使用 'with' 而不是 'env' 来传递参数
        openwrt_armvirt: openwrt/bin/targets/armsr/armv8/openwrt-armsr-armv8-generic-rootfs.tar.gz
        kernel_repo_url: tiantuuy/test
        save_openwrt_rootfs: true
        kernel_version_name: 6.18.y
        package_soc: s905d
        gzip_imgs: .gz
        whoami: test
        sw_flowoffload: 0
        sfe_flow: 0
        enable_wifi_k510: 0
        openwrt_ip: 192.168.110.249

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2  # 修复：使用 v2 而不是 master
      with:
        tag_name: openwrt_armsr-armv8_${{ env.FILE_DATE }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*.{img.xz,img.gz,tar.gz}
        body: |
          首次使用建议全新刷写
          * 基本信息
          openwrt-25.12分支
          IP: 192.168.110.249
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4  # 修复：指定具体版本
      with:
        keep_latest: 2
        delete_tags: true  # 修复：移除空格
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2.1.0
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 0
